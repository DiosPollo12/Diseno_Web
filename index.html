<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Halcon Express</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* ---------- LIGHT MODE (DEFAULT) ---------- */
body {
  background: #eef2f5;
  padding: 28px;
  transition: 0.3s;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.dashboard {
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
}

.left {
  flex: 2;
  min-width: 300px;
}

.right {
  flex: 1;
  min-width: 280px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

h2 {
  border-left: 5px solid #f5a623;
  padding-left: 10px;
  margin-bottom: 15px;
  color: #1e2f4b;
}

label {
  font-size: 0.8rem;
  font-weight: 600;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #d1d9e6;
  margin-top: 5px;
  margin-bottom: 10px;
}

button {
  background: #1e3c72;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 15px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #f5a623;
}

.cart {
  background: #f4f7fb;
  padding: 10px;
  border-radius: 12px;
}

/* ---------- DARK MODE ---------- */
body.dark {
  background: #0f172a;
}

body.dark .card {
  background: #1e293b;
  color: white;
}

body.dark h2 {
  color: #fbbf24;
}

body.dark input,
body.dark select {
  background: #0f172a;
  border: 1px solid #334155;
  color: white;
}

body.dark .cart {
  background: #020617;
}

body.dark button {
  background: #f5a623;
  color: black;
}

body.dark button:hover {
  background: #fbbf24;
}

/* toggle button */
.toggle-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  background: black;
  color: white;
  border-radius: 20px;
  padding: 8px 15px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="toggle-btn" onclick="toggleDark()">
  🌙 / ☀️
</div>

<div class="dashboard">

<!-- LEFT -->
<div class="left card">
<h2><i class="fas fa-hard-hat"></i> Halcon Express</h2>

<label>Nombre</label>
<input id="name">

<label>Teléfono</label>
<input id="phone">

<label>Material</label>
<select id="material">
  <option value="200">Cemento - $200</option>
  <option value="15">Ladrillo - $15</option>
</select>

<label>Cantidad</label>
<input id="qty" type="number">

<button onclick="add()">Agregar</button>

<div class="cart" id="cart">Carrito vacío</div>

<button onclick="createOrder()">Crear pedido</button>

<p id="msg"></p>
</div>

<!-- RIGHT -->
<div class="right">

<div class="card">
<h2>Pedidos</h2>
<div id="orders">Sin pedidos</div>
</div>

<div class="card">
<h2>Buscar</h2>
<input id="search">
<button onclick="searchOrder()">Buscar</button>
<p id="result"></p>
</div>

</div>
</div>

<script>
let cart = [];
let orders = [];
let id = 100;

function add() {
  let mat = document.getElementById("material");
  let qty = document.getElementById("qty").value;

  if (!qty) return;

  let name = mat.options[mat.selectedIndex].text;
  let price = mat.value;

  cart.push({name, qty, price});
  renderCart();
}

function renderCart() {
  let c = document.getElementById("cart");
  if (cart.length === 0) {
    c.innerHTML = "Carrito vacío";
    return;
  }

  c.innerHTML = cart.map(i =>
    `${i.name} x${i.qty}`
  ).join("<br>");
}

function createOrder() {
  let name = document.getElementById("name").value;
  if (!name || cart.length === 0) return;

  let folio = "HAL-" + id++;
  orders.push({folio, name});

  document.getElementById("msg").innerText = "Pedido creado: " + folio;

  cart = [];
  renderCart();
  renderOrders();
}

function renderOrders() {
  let o = document.getElementById("orders");

  if (orders.length === 0) {
    o.innerHTML = "Sin pedidos";
    return;
  }

  o.innerHTML = orders.map(x =>
    `${x.folio} - ${x.name}`
  ).join("<br>");
}

function searchOrder() {
  let f = document.getElementById("search").value;

  let found = orders.find(o => o.folio === f);

  document.getElementById("result").innerText =
    found ? "Encontrado" : "No encontrado";
}

/* DARK MODE */
function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
