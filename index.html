<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Halcon Express</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  background:#eef2f5;
  padding:25px;
  transition:.3s;
}

/* layout */
.dashboard{display:flex;gap:25px;flex-wrap:wrap;}
.creator-section{flex:2;min-width:320px;}
.right-panel{flex:1;min-width:300px;display:flex;flex-direction:column;gap:20px;}

.card-glass{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
  border-left:5px solid #f5a623;
  padding-left:10px;
  margin-bottom:15px;
  color:#1e2f4b;
}

label{font-size:.8rem;font-weight:600;}

input,select{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #d1d9e6;
  margin:5px 0 10px;
}

button{
  background:#1e3c72;
  color:white;
  border:none;
  padding:10px;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
}
button:hover{background:#f5a623;}

.cart-items{
  background:#f4f7fb;
  padding:10px;
  border-radius:12px;
}

.order-item{
  background:white;
  padding:10px;
  border-radius:12px;
  margin-bottom:8px;
  border-left:4px solid #f5a623;
}

/* DARK MODE */
body.dark{background:#0f172a;}
body.dark .card-glass{background:#1e293b;color:white;}
body.dark h2{color:#fbbf24;}
body.dark input,body.dark select{
  background:#020617;
  color:white;
  border:1px solid #334155;
}
body.dark .cart-items{background:#020617;}
body.dark .order-item{background:#020617;color:white;}
body.dark button{background:#f5a623;color:black;}
body.dark button:hover{background:#fbbf24;}

/* toggle */
.dark-toggle{
  position:fixed;
  top:15px;
  right:15px;
  background:#1e3c72;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<button class="dark-toggle" onclick="toggleDarkMode()">🌙 / ☀️</button>

<div class="dashboard">

<!-- LEFT -->
<div class="creator-section">
<div class="card-glass">

<h2><i class="fas fa-hard-hat"></i> Halcon Express</h2>

<label>Nombre</label>
<input id="custName">

<label>Teléfono</label>
<input id="custPhone">

<label>Material</label>
<select id="productSelect">
<option value="">Selecciona</option>
<option value="200" data-name="Cemento">Cemento - $200</option>
<option value="15" data-name="Ladrillo">Ladrillo - $15</option>
</select>

<label>Cantidad</label>
<input id="qtyInput" type="number">

<button onclick="appendMaterial()">Agregar</button>

<div class="cart-items" id="cartArea">Carrito vacío</div>

<button onclick="buildCompleteOrder()">Crear pedido</button>

<div id="creationMsg"></div>

</div>
</div>

<!-- RIGHT -->
<div class="right-panel">

<div class="card-glass">
<h2>Pedidos</h2>
<div id="ordersListContainer">Sin pedidos</div>
</div>

<div class="card-glass">
<h2>Buscar</h2>
<input id="folioSearchField" placeholder="Ej: HAL-500">
<button onclick="searchOrderByFolio()">Buscar</button>
<div id="orderDetailsResult"></div>
</div>

</div>

</div>

<script>
let cart=[];
let orders=JSON.parse(localStorage.getItem("orders"))||[];
let folio=orders.length>0 ? parseInt(orders[orders.length-1].folio.split("-")[1])+1 : 500;

/* CART */
function appendMaterial(){
let prod=document.getElementById("productSelect");
let qty=document.getElementById("qtyInput").value;

if(!prod.value||!qty)return;

cart.push({
name:prod.options[prod.selectedIndex].dataset.name,
price:prod.value,
qty:qty
});
renderCart();
}

function renderCart(){
let c=document.getElementById("cartArea");
if(cart.length===0){c.innerHTML="Carrito vacío";return;}
c.innerHTML=cart.map(i=>`${i.name} x${i.qty}`).join("<br>");
}

/* CREATE ORDER */
function buildCompleteOrder(){
let name=document.getElementById("custName").value;
if(!name||cart.length===0)return;

let id="HAL-"+folio++;

let total=cart.reduce((sum,i)=>sum+(i.price*i.qty),0);

orders.push({
folio:id,
customer:name,
total:total,
status:"Preparando"
});

localStorage.setItem("orders",JSON.stringify(orders));

document.getElementById("creationMsg").innerText="Pedido creado: "+id;

cart=[];
renderCart();
renderOrders();
}

/* RENDER */
function renderOrders(){
let o=document.getElementById("ordersListContainer");
if(orders.length===0){o.innerHTML="Sin pedidos";return;}

o.innerHTML=orders.map(x=>`
<div class="order-item">
${x.folio} - ${x.customer} ($${x.total})
</div>
`).join("");
}

/* SEARCH (FIXED 🔥) */
function searchOrderByFolio(){
let input=document.getElementById("folioSearchField").value.trim();

// extrae solo HAL-XXXX
let match=input.match(/HAL-\d+/);

if(!match){
document.getElementById("orderDetailsResult").innerHTML="Formato inválido";
return;
}

let folioSearch=match[0];

let found=orders.find(o=>o.folio===folioSearch);

if(!found){
document.getElementById("orderDetailsResult").innerHTML="Pedido no encontrado";
return;
}

document.getElementById("orderDetailsResult").innerHTML=`
<div class="card-glass">
<strong>Folio:</strong> ${found.folio}<br>
<strong>Cliente:</strong> ${found.customer}<br>
<strong>Total:</strong> $${found.total}<br>
<strong>Status:</strong> ${found.status}
</div>
`;
}

/* DARK MODE */
function toggleDarkMode(){
document.body.classList.toggle("dark");
}

/* INIT */
renderOrders();
</script>

</body>
</html>
