<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halcón - Sistema</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#eef2f5; }

.container-flex{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.panel{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    flex:1;
    min-width:300px;
}

.cart{
    background:#f8f9fa;
    padding:10px;
    border-radius:10px;
    max-height:150px;
    overflow:auto;
}

.order{
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
}

.status{
    padding:5px 10px;
    border-radius:20px;
    font-weight:bold;
}

.ordered{ background:#dbeafe; }
.process{ background:#fef3c7; }
.route{ background:#fde68a; }
.delivered{ background:#d1fae5; }

</style>
</head>

<body class="p-4">

<h1 class="text-center mb-4">🏗️ Halcón - Sistema de Pedidos</h1>

<div class="container-flex">

<!-- CREAR PEDIDO -->
<div class="panel">
<h4>Crear Pedido</h4>

<input id="nombre" class="form-control mb-2" placeholder="Cliente">

<select id="material" class="form-control mb-2">
<option value="">Material</option>
<option value="200">Cemento</option>
<option value="15">Ladrillo</option>
<option value="500">Arena</option>
</select>

<input id="cantidad" type="number" class="form-control mb-2" placeholder="Cantidad">

<button class="btn btn-success w-100" onclick="agregar()">Agregar</button>

<div id="carrito" class="cart mt-2">Vacío</div>

<button class="btn btn-primary w-100 mt-2" onclick="crear()">Crear Pedido</button>

<div id="msg"></div>
</div>

<!-- LISTA PEDIDOS -->
<div class="panel">
<h4>Pedidos</h4>

<div id="listaPedidos">Sin pedidos</div>
</div>

<!-- CONSULTA -->
<div class="panel">
<h4>Consultar Pedido</h4>

<input id="folio" class="form-control mb-2" placeholder="Ej: F1">

<button class="btn btn-dark w-100" onclick="buscar()">Buscar</button>

<div id="detalle" class="mt-3"></div>
</div>

</div>

<script>

let carrito = [];
let pedidos = [];
let id = 1;

// AGREGAR MATERIAL
function agregar(){
    let mat = document.getElementById("material");
    let cant = document.getElementById("cantidad").value;

    if(!mat.value || cant <= 0){
        alert("Error");
        return;
    }

    carrito.push({
        nombre: mat.options[mat.selectedIndex].text,
        precio: mat.value,
        cantidad: cant
    });

    renderCarrito();
}

// MOSTRAR CARRITO
function renderCarrito(){
    if(carrito.length === 0){
        document.getElementById("carrito").innerHTML = "Vacío";
        return;
    }

    let html = "";
    carrito.forEach(p=>{
        html += `<div>${p.nombre} x ${p.cantidad}</div>`;
    });

    document.getElementById("carrito").innerHTML = html;
}

// CREAR PEDIDO
function crear(){
    let nombre = document.getElementById("nombre").value;

    if(!nombre || carrito.length === 0){
        alert("Completa datos");
        return;
    }

    let nuevo = {
        folio: "F"+id,
        cliente: nombre,
        estado: "Ordered",
        productos: carrito,
        foto:"https://via.placeholder.com/200"
    };

    pedidos.push(nuevo);
    id++;
    carrito = [];

    renderCarrito();
    renderPedidos();

    document.getElementById("msg").innerHTML =
    `<div class="alert alert-success">Pedido creado ${nuevo.folio}</div>`;

    simularEstados(nuevo);
}

// MOSTRAR LISTA
function renderPedidos(){
    if(pedidos.length === 0){
        document.getElementById("listaPedidos").innerHTML = "Sin pedidos";
        return;
    }

    let html="";
    pedidos.forEach(p=>{
        html += `
        <div class="order" onclick="ver('${p.folio}')">
            <b>${p.cliente}</b> - ${p.folio}<br>
            <small>${p.estado}</small>
        </div>`;
    });

    document.getElementById("listaPedidos").innerHTML = html;
}

// BUSCAR
function buscar(){
    let f = document.getElementById("folio").value;
    ver(f);
}

// VER DETALLE
function ver(folio){
    let p = pedidos.find(x=>x.folio===folio);

    if(!p){
        document.getElementById("detalle").innerHTML="No encontrado";
        return;
    }

    let clase="";
    if(p.estado==="Ordered") clase="ordered";
    if(p.estado==="In process") clase="process";
    if(p.estado==="In route") clase="route";
    if(p.estado==="Delivered") clase="delivered";

    let html = `
    <div class="status ${clase}">${p.estado}</div>
    <p><b>Cliente:</b> ${p.cliente}</p>
    <p><b>Productos:</b></p>
    <ul>
    ${p.productos.map(x=>`<li>${x.nombre} x ${x.cantidad}</li>`).join("")}
    </ul>
    `;

    if(p.estado==="Delivered"){
        html += `<img src="${p.foto}" class="img-fluid">`;
    }

    document.getElementById("detalle").innerHTML = html;
}

// SIMULAR ESTADOS (como sistema real)
function simularEstados(p){
    setTimeout(()=>{ p.estado="In process"; renderPedidos(); },4000);
    setTimeout(()=>{ p.estado="In route"; renderPedidos(); },8000);
    setTimeout(()=>{ p.estado="Delivered"; renderPedidos(); },12000);
}

</script>

</body>
</html>
