<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halcon Express</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

<div class="dashboard">

  <!-- LEFT -->
  <div class="creator-section">
    <div class="card-glass">

      <h2><i class="fas fa-hard-hat"></i> Halcon Express</h2>

      <div class="form-grid">
        <div>
          <label>Nombre</label>
          <input id="custName">
        </div>

        <div>
          <label>Teléfono</label>
          <input id="custPhone">
        </div>

        <div class="full-width">
          <label>Material</label>
          <select id="productSelect">
            <option value="">Selecciona</option>
            <option value="200">Cemento - $200</option>
            <option value="15">Ladrillo - $15</option>
          </select>
        </div>

        <div>
          <label>Cantidad</label>
          <input id="qtyInput" type="number">
        </div>

        <div class="full-width">
          <button onclick="appendMaterial()">Agregar</button>
        </div>
      </div>

      <div class="cart-items" id="cartArea">Vacío</div>

      <button onclick="buildCompleteOrder()">Crear pedido</button>

      <div id="creationMsg"></div>

      <br>
      <a href="dashboard.html">
        <button>Ir al dashboard</button>
      </a>

    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
