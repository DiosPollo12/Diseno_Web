<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halcon Express</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #0f172a;
      padding: 25px;
      color: #e2e8f0;
    }

    .dashboard {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      max-width: 1400px;
      margin: auto;
    }

    .creator-section {
      flex: 2;
    }

    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h2 {
      color: #fbbf24;
      margin-bottom: 15px;
    }

    label {
      font-size: 12px;
      color: #94a3b8;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
    }

    button {
      background: #fbbf24;
      border: none;
      padding: 10px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #f59e0b;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .full-width {
      grid-column: span 2;
    }

    .cart-items {
      background: #0f172a;
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
    }

    .order-item {
      background: #0f172a;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 4px solid #fbbf24;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="dashboard">

  <!-- CREAR PEDIDO -->
  <div class="creator-section">
    <div class="card">
      <h2><i class="fas fa-hard-hat"></i> Halcon Express</h2>

      <div class="form-grid">
        <div>
          <label>Nombre</label>
          <input id="custName">
        </div>

        <div>
          <label>Teléfono</label>
          <input id="custPhone">
        </div>

        <div class="full-width">
          <label>Material</label>
          <select id="productSelect">
            <option value="">Selecciona</option>
            <option value="200" data-name="Cement">Cemento - $200</option>
            <option value="15" data-name="Brick">Ladrillo - $15</option>
          </select>
        </div>

        <div>
          <label>Cantidad</label>
          <input id="qtyInput" type="number">
        </div>

        <div class="full-width">
          <button onclick="addItem()">Agregar</button>
        </div>
      </div>

      <div class="cart-items" id="cartArea">Carrito vacío</div>

      <button onclick="createOrder()">Crear pedido</button>

      <div id="msg"></div>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="right-panel">

    <div class="card">
      <h2>Pedidos</h2>
      <div id="orders"></div>
    </div>

    <div class="card">
      <h2>Buscar</h2>
      <input id="search">
      <button onclick="search()">Buscar</button>
      <div id="result"></div>
    </div>

  </div>

</div>

<script>
let cart = [];
let orders = [];

function addItem() {
  const select = document.getElementById("productSelect");
  const qty = document.getElementById("qtyInput").value;

  if (!select.value || !qty) return;

  cart.push({
    name: select.options[select.selectedIndex].text,
    qty: qty
  });

  renderCart();
}

function renderCart() {
  const area = document.getElementById("cartArea");

  if (cart.length === 0) {
    area.innerHTML = "Carrito vacío";
    return;
  }

  area.innerHTML = "";

  cart.forEach(item => {
    area.innerHTML += `<div>${item.name} x ${item.qty}</div>`;
  });
}

function createOrder() {
  const name = document.getElementById("custName").value;

  if (!name || cart.length === 0) return;

  const order = {
    id: "HAL-" + Math.floor(Math.random()*1000),
    name,
    cart: [...cart]
  };

  orders.push(order);

  document.getElementById("msg").innerText = "Pedido creado";

  cart = [];
  renderCart();
  renderOrders();
}

function renderOrders() {
  const div = document.getElementById("orders");

  div.innerHTML = "";

  orders.forEach(o => {
    div.innerHTML += `<div class="order-item">${o.id} - ${o.name}</div>`;
  });
}

function search() {
  const val = document.getElementById("search").value;

  const order = orders.find(o => o.id === val);

  if (!order) {
    document.getElementById("result").innerText = "No encontrado";
    return;
  }

  document.getElementById("result").innerText = order.name;
}
</script>

</body>
</html>
