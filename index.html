<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halcon Express</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, sans-serif;
  }

  body {
    background: #e9edf2; /* gris suave (antes blanco) */
    padding: 28px 24px;
  }

  .dashboard {
    max-width: 1500px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
  }

  .creator-section {
    flex: 2.2;
    min-width: 340px;
  }

  .right-panel {
    flex: 1.4;
    min-width: 310px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Cards (mismo estilo pero más limpio) */
  .card-glass {
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    padding: 1.6rem;
    border: 1px solid #e3e8ef;
  }

  h2 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #1e2f4b;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 4px solid #f5a623;
    padding-left: 14px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 20px;
  }

  .full-width {
    grid-column: span 2;
  }

  label {
    font-weight: 600;
    font-size: 0.8rem;
    color: #374151;
    margin-bottom: 5px;
    display: block;
  }

  input, select {
    width: 100%;
    padding: 11px 14px;
    border-radius: 14px;
    border: 1px solid #d1d9e6;
    background: #f9fbfd;
    font-size: 0.95rem;
    transition: 0.2s;
  }

  input:focus, select:focus {
    border-color: #f5a623;
    box-shadow: 0 0 0 2px rgba(245,166,35,0.15);
    outline: none;
  }

  button {
    background: #1e3c72;
    color: white;
    border: none;
    padding: 11px;
    border-radius: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #f5a623;
  }

  .cart-items {
    background: #f4f7fb;
    border-radius: 14px;
    padding: 12px;
    margin: 10px 0;
  }

  .cart-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #e5eaf2;
    font-size: 0.9rem;
  }

  .badge-total {
    background: #f5a62320;
    border-radius: 20px;
    padding: 6px 14px;
    font-weight: bold;
  }

  .order-item {
    background: #ffffff;
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 10px;
    border-left: 4px solid #f5a623;
    cursor: pointer;
    transition: 0.15s;
  }

  .order-item:hover {
    background: #fff7ec;
  }

  .chip {
    background: #eef2ff;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.75rem;
  }

  .hidden {
    display: none;
  }

  @media (max-width: 750px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
    .full-width {
      grid-column: span 1;
    }
  }
</style>
</head>

<body>

<div class="dashboard">

  <!-- CREAR PEDIDO -->
  <div class="creator-section">
    <div class="card">
      <h2><i class="fas fa-hard-hat"></i> Halcon Express</h2>

      <div class="form-grid">
        <div>
          <label>Nombre</label>
          <input id="custName">
        </div>

        <div>
          <label>Teléfono</label>
          <input id="custPhone">
        </div>

        <div class="full-width">
          <label>Material</label>
          <select id="productSelect">
            <option value="">Selecciona</option>
            <option value="200" data-name="Cement">Cemento - $200</option>
            <option value="15" data-name="Brick">Ladrillo - $15</option>
          </select>
        </div>

        <div>
          <label>Cantidad</label>
          <input id="qtyInput" type="number">
        </div>

        <div class="full-width">
          <button onclick="addItem()">Agregar</button>
        </div>
      </div>

      <div class="cart-items" id="cartArea">Carrito vacío</div>

      <button onclick="createOrder()">Crear pedido</button>

      <div id="msg"></div>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="right-panel">

    <div class="card">
      <h2>Pedidos</h2>
      <div id="orders"></div>
    </div>

    <div class="card">
      <h2>Buscar</h2>
      <input id="search">
      <button onclick="search()">Buscar</button>
      <div id="result"></div>
    </div>

  </div>

</div>

<script>
let cart = [];
let orders = [];

function addItem() {
  const select = document.getElementById("productSelect");
  const qty = document.getElementById("qtyInput").value;

  if (!select.value || !qty) return;

  cart.push({
    name: select.options[select.selectedIndex].text,
    qty: qty
  });

  renderCart();
}

function renderCart() {
  const area = document.getElementById("cartArea");

  if (cart.length === 0) {
    area.innerHTML = "Carrito vacío";
    return;
  }

  area.innerHTML = "";

  cart.forEach(item => {
    area.innerHTML += `<div>${item.name} x ${item.qty}</div>`;
  });
}

function createOrder() {
  const name = document.getElementById("custName").value;

  if (!name || cart.length === 0) return;

  const order = {
    id: "HAL-" + Math.floor(Math.random()*1000),
    name,
    cart: [...cart]
  };

  orders.push(order);

  document.getElementById("msg").innerText = "Pedido creado";

  cart = [];
  renderCart();
  renderOrders();
}

function renderOrders() {
  const div = document.getElementById("orders");

  div.innerHTML = "";

  orders.forEach(o => {
    div.innerHTML += `<div class="order-item">${o.id} - ${o.name}</div>`;
  });
}

function search() {
  const val = document.getElementById("search").value;

  const order = orders.find(o => o.id === val);

  if (!order) {
    document.getElementById("result").innerText = "No encontrado";
    return;
  }

  document.getElementById("result").innerText = order.name;
}
</script>

</body>
</html>
