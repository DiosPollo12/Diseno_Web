<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halcon Express</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

 <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
}

body {
  background: #121826; /* oscuro elegante */
  padding: 28px 24px;
  color: #e5e7eb;
}

.dashboard {
  max-width: 1500px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
  margin-bottom: 40px;
}

.creator-section {
  flex: 2.2;
  min-width: 340px;
}

.right-panel {
  flex: 1.4;
  min-width: 310px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* Cards (ligero cambio, no radical) */
.card-glass {
  background: #1e293b;
  border-radius: 36px;
  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
  padding: 1.8rem;
  border: 1px solid #334155;
}

h2 {
  font-size: 1.6rem;
  font-weight: 700;
  color: #fbbf24;
  margin-bottom: 1.3rem;
  display: flex;
  align-items: center;
  gap: 12px;
  border-left: 5px solid #fbbf24;
  padding-left: 18px;
}

/* FORM */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px 22px;
}

.full-width {
  grid-column: span 2;
}

label {
  font-weight: 700;
  font-size: 0.75rem;
  color: #9ca3af;
  margin-bottom: 6px;
  display: block;
}

input, select {
  width: 100%;
  padding: 12px 16px;
  border-radius: 28px;
  border: 1px solid #334155;
  background: #0f172a;
  color: white;
}

input:focus, select:focus {
  border-color: #fbbf24;
  box-shadow: 0 0 0 3px rgba(251,191,36,0.2);
}

/* BOTONES */
button {
  background: #fbbf24;
  color: #111827;
  border: none;
  font-weight: 700;
  cursor: pointer;
  margin-top: 6px;
  transition: 0.2s;
}

button:hover {
  background: #f59e0b;
  transform: translateY(-2px);
}

/* CART */
.cart-items {
  background: #0f172a;
  border-radius: 24px;
  padding: 16px;
  margin: 12px 0;
  max-height: 210px;
  overflow-y: auto;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #334155;
  font-size: 0.9rem;
}

/* TOTAL */
.badge-total {
  background: rgba(251,191,36,0.15);
  border-radius: 40px;
  padding: 8px 20px;
  font-weight: 800;
  font-size: 1.3rem;
}

/* ORDERS */
.order-item {
  background: #0f172a;
  border-radius: 24px;
  padding: 14px 18px;
  margin-bottom: 12px;
  border-left: 5px solid #fbbf24;
  cursor: pointer;
}

.order-item:hover {
  background: #1e293b;
  transform: translateX(4px);
}

.hidden {
  display: none;
}

@media (max-width: 750px) {
  .form-grid { grid-template-columns: 1fr; }
  .full-width { grid-column: span 1; }
}
</style>
</head>

<body>

<div class="dashboard">

  <!-- CREAR PEDIDO -->
  <div class="creator-section">
    <div class="card">
      <h2><i class="fas fa-hard-hat"></i> Halcon Express</h2>

      <div class="form-grid">
        <div>
          <label>Nombre</label>
          <input id="custName">
        </div>

        <div>
          <label>Teléfono</label>
          <input id="custPhone">
        </div>

        <div class="full-width">
          <label>Material</label>
          <select id="productSelect">
            <option value="">Selecciona</option>
            <option value="200" data-name="Cement">Cemento - $200</option>
            <option value="15" data-name="Brick">Ladrillo - $15</option>
          </select>
        </div>

        <div>
          <label>Cantidad</label>
          <input id="qtyInput" type="number">
        </div>

        <div class="full-width">
          <button onclick="addItem()">Agregar</button>
        </div>
      </div>

      <div class="cart-items" id="cartArea">Carrito vacío</div>

      <button onclick="createOrder()">Crear pedido</button>

      <div id="msg"></div>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="right-panel">

    <div class="card">
      <h2>Pedidos</h2>
      <div id="orders"></div>
    </div>

    <div class="card">
      <h2>Buscar</h2>
      <input id="search">
      <button onclick="search()">Buscar</button>
      <div id="result"></div>
    </div>

  </div>

</div>

<script>
let cart = [];
let orders = [];

function addItem() {
  const select = document.getElementById("productSelect");
  const qty = document.getElementById("qtyInput").value;

  if (!select.value || !qty) return;

  cart.push({
    name: select.options[select.selectedIndex].text,
    qty: qty
  });

  renderCart();
}

function renderCart() {
  const area = document.getElementById("cartArea");

  if (cart.length === 0) {
    area.innerHTML = "Carrito vacío";
    return;
  }

  area.innerHTML = "";

  cart.forEach(item => {
    area.innerHTML += `<div>${item.name} x ${item.qty}</div>`;
  });
}

function createOrder() {
  const name = document.getElementById("custName").value;

  if (!name || cart.length === 0) return;

  const order = {
    id: "HAL-" + Math.floor(Math.random()*1000),
    name,
    cart: [...cart]
  };

  orders.push(order);

  document.getElementById("msg").innerText = "Pedido creado";

  cart = [];
  renderCart();
  renderOrders();
}

function renderOrders() {
  const div = document.getElementById("orders");

  div.innerHTML = "";

  orders.forEach(o => {
    div.innerHTML += `<div class="order-item">${o.id} - ${o.name}</div>`;
  });
}

function search() {
  const val = document.getElementById("search").value;

  const order = orders.find(o => o.id === val);

  if (!order) {
    document.getElementById("result").innerText = "No encontrado";
    return;
  }

  document.getElementById("result").innerText = order.name;
}
</script>

</body>
</html>
