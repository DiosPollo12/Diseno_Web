<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halcón Sistema Completo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

h1{
    font-weight: 700;
    color: #facc15;
}

/* CARDS */
.card{
    background: rgba(30, 41, 59, 0.9);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: #e2e8f0;
}

/* INPUTS */
input, select{
    background: #1e293b !important;
    color: white !important;
    border: 1px solid #334155 !important;
}

input::placeholder{
    color: #94a3b8;
}

/* BOTONES */
button{
    border-radius: 12px !important;
    font-weight: 600;
}

.btn-success{
    background: #22c55e;
    border: none;
}

.btn-success:hover{
    background: #16a34a;
}

.btn-primary{
    background: #3b82f6;
    border: none;
}

.btn-primary:hover{
    background: #2563eb;
}

.btn-dark{
    background: #facc15;
    color: black;
    border: none;
}

.btn-dark:hover{
    background: #eab308;
}

/* CARRITO */
.cart{
    background: #020617;
    border: 1px solid #334155;
    border-radius: 12px;
}

/* LISTA PEDIDOS */
.order{
    background: #020617;
    border: 1px solid #334155;
    border-radius: 12px;
    transition: 0.2s;
}

.order:hover{
    background: #1e293b;
    transform: translateX(5px);
}

/* ESTADOS */
.status{
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: bold;
    display: inline-block;
    margin-bottom: 10px;
}

.ordered{ background:#3b82f6; }
.process{ background:#facc15; color:black; }
.route{ background:#fb923c; }
.delivered{ background:#22c55e; }

/* MAPA */
#map{
    border-radius: 20px;
    overflow: hidden;
    border: 2px solid #334155;
}

/* SCROLL BONITO */
::-webkit-scrollbar{
    width:6px;
}
::-webkit-scrollbar-thumb{
    background:#475569;
    border-radius:10px;
}
</style>
</head>

<body class="p-4">

<h1 class="text-center mb-4">🏗️ Halcón Sistema Completo</h1>

<div class="row">

<!-- CREAR PEDIDO -->
<div class="col-md-4">
<div class="card p-3 shadow">

<h4>Crear Pedido</h4>

<input id="nombre" class="form-control mb-2" placeholder="Cliente">

<select id="material" class="form-control mb-2">
<option value="">Material</option>
<option value="200">Cemento</option>
<option value="15">Ladrillo</option>
<option value="500">Arena</option>
<option value="400">Grava</option>
<option value="300">Varilla</option>
</select>

<input id="cantidad" type="number" class="form-control mb-2" placeholder="Cantidad">

<button class="btn btn-success w-100" onclick="addCart()">Agregar</button>

<div id="carrito" class="cart mt-2">Vacío</div>

<select id="modo" class="form-control mt-2">
<option value="delivery">Entrega</option>
<option value="pickup">Recolección</option>
</select>

<input id="direccion" class="form-control mt-2" placeholder="Dirección">

<button class="btn btn-primary w-100 mt-2" onclick="crearPedido()">Crear pedido</button>

<div id="msg"></div>

</div>
</div>

<!-- LISTA -->
<div class="col-md-4">
<div class="card p-3 shadow">

<h4>Pedidos</h4>
<div id="lista">Sin pedidos</div>

</div>
</div>

<!-- CONSULTA -->
<div class="col-md-4">
<div class="card p-3 shadow">

<h4>Consultar</h4>

<input id="cliente" class="form-control mb-2" placeholder="Cliente">
<input id="factura" class="form-control mb-2" placeholder="Factura">

<button class="btn btn-dark w-100" onclick="buscar()">Buscar</button>

<div id="detalle"></div>

</div>
</div>

</div>

<!-- MAPA -->
<div id="map" style="height:300px;margin-top:20px;"></div>

<script>

let carrito=[];
let pedidos=[];
let id=1;

// MAPA
let map=L.map('map').setView([19.4326,-99.1332],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// CARRITO
function addCart(){
let mat=document.getElementById("material");
let cant=document.getElementById("cantidad").value;

if(!mat.value||cant<=0){alert("Error");return;}

carrito.push({
nombre:mat.options[mat.selectedIndex].text,
precio:mat.value,
cantidad:cant
});

renderCart();
}

function renderCart(){
if(carrito.length===0){
document.getElementById("carrito").innerHTML="Vacío";
return;
}

let html="";
carrito.forEach(p=>{
html+=`<div>${p.nombre} x ${p.cantidad}</div>`;
});

document.getElementById("carrito").innerHTML=html;
}

// CREAR PEDIDO
function crearPedido(){
let nombre=document.getElementById("nombre").value;
let direccion=document.getElementById("direccion").value;

if(!nombre||carrito.length===0){alert("Completa datos");return;}

let pedido={
cliente:"C"+id,
factura:"F"+id,
nombre:nombre,
estado:"Ordered",
direccion:direccion,
productos:carrito,
foto:"https://via.placeholder.com/200",
lat:19.43+(Math.random()*0.05),
lng:-99.13+(Math.random()*0.05)
};

pedidos.push(pedido);
id++;
carrito=[];

renderCart();
renderPedidos();

document.getElementById("msg").innerHTML=
`<div class="alert alert-success">Pedido creado ${pedido.factura}</div>`;

simular(pedido);
}

// LISTA
function renderPedidos(){
if(pedidos.length===0){
document.getElementById("lista").innerHTML="Sin pedidos";
return;
}

let html="";
pedidos.forEach(p=>{
html+=`
<div class="order" onclick="ver('${p.factura}')">
<b>${p.nombre}</b> - ${p.factura}<br>
<small>${p.estado}</small>
</div>`;
});

document.getElementById("lista").innerHTML=html;
}

// BUSCAR
function buscar(){
let c=document.getElementById("cliente").value;
let f=document.getElementById("factura").value;

let p=pedidos.find(x=>x.cliente===c&&x.factura===f);

if(!p){
document.getElementById("detalle").innerHTML="No encontrado";
return;
}

mostrarDetalle(p);
}

// VER
function ver(f){
let p=pedidos.find(x=>x.factura===f);
mostrarDetalle(p);
}

// DETALLE
function mostrarDetalle(p){

let clase="";
if(p.estado==="Ordered") clase="ordered";
if(p.estado==="In process") clase="process";
if(p.estado==="In route") clase="route";
if(p.estado==="Delivered") clase="delivered";

let html=`
<div class="status ${clase}">${p.estado}</div>
<p><b>Cliente:</b> ${p.nombre}</p>
<p><b>Dirección:</b> ${p.direccion}</p>
<ul>${p.productos.map(x=>`<li>${x.nombre} x ${x.cantidad}</li>`).join("")}</ul>
`;

if(p.estado==="Delivered"){
html+=`<img src="${p.foto}" class="img-fluid">`;
}

document.getElementById("detalle").innerHTML=html;

// MARCADOR
L.marker([p.lat,p.lng]).addTo(map)
.bindPopup(p.factura)
.openPopup();
}

// ESTADOS
function simular(p){
setTimeout(()=>{p.estado="In process";renderPedidos();},4000);
setTimeout(()=>{p.estado="In route";renderPedidos();},8000);
setTimeout(()=>{p.estado="Delivered";renderPedidos();},12000);
}

</script>

</body>
</html>
