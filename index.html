<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halcón - Consulta de Pedidos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#eef2f5;
}
.card{
    border-radius:20px;
}
.status{
    font-weight:bold;
    padding:6px 15px;
    border-radius:20px;
}
.ordered{ background:#dbeafe; color:#1e40af; }
.process{ background:#fef3c7; color:#92400e; }
.route{ background:#fde68a; color:#78350f; }
.delivered{ background:#d1fae5; color:#065f46; }
</style>
</head>

<body class="p-4">

<div class="container">

    <!-- TITULO -->
    <h1 class="text-center mb-4">🏗️ Halcón - Consulta de Pedido</h1>

    <!-- FORMULARIO CLIENTE -->
    <div class="card p-4 mb-4 shadow">
        <h4>Consulta tu pedido</h4>

        <input id="cliente" class="form-control mb-2" placeholder="Número de cliente">
        <input id="factura" class="form-control mb-3" placeholder="Número de factura">

        <button class="btn btn-primary w-100" onclick="consultarPedido()">Consultar</button>

        <div id="resultado" class="mt-3"></div>
    </div>

    <!-- DASHBOARD -->
    <div class="card p-4 shadow">
        <h4>Dashboard Administrativo</h4>

        <div class="row text-center mt-3">
            <div class="col-md-3">
                <div class="card p-3">
                    <h5>Total</h5>
                    <h3 id="totalPedidos">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3">
                    <h5>Ordenados</h5>
                    <h3 id="ordenados">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3">
                    <h5>En proceso</h5>
                    <h3 id="proceso">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3">
                    <h5>Entregados</h5>
                    <h3 id="entregados">0</h3>
                </div>
            </div>
        </div>
    </div>

</div>

<script>

// BASE DE DATOS SIMULADA (como si fuera backend)
let pedidos = [
    {
        cliente: "1001",
        factura: "F001",
        estado: "Ordered"
    },
    {
        cliente: "1002",
        factura: "F002",
        estado: "In process"
    },
    {
        cliente: "1003",
        factura: "F003",
        estado: "In route"
    },
    {
        cliente: "1004",
        factura: "F004",
        estado: "Delivered",
        foto: "https://via.placeholder.com/200"
    }
];

// CONSULTAR PEDIDO
function consultarPedido(){
    let c = document.getElementById("cliente").value;
    let f = document.getElementById("factura").value;

    let pedido = pedidos.find(p => p.cliente === c && p.factura === f);

    let resultado = document.getElementById("resultado");

    if(!pedido){
        resultado.innerHTML = `<div class="alert alert-danger">Pedido no encontrado</div>`;
        return;
    }

    let clase = "";
    if(pedido.estado === "Ordered") clase = "ordered";
    if(pedido.estado === "In process") clase = "process";
    if(pedido.estado === "In route") clase = "route";
    if(pedido.estado === "Delivered") clase = "delivered";

    let html = `
        <div class="alert alert-info">
            Estado: <span class="status ${clase}">${pedido.estado}</span>
        </div>
    `;

    // FOTO SI ESTA ENTREGADO
    if(pedido.estado === "Delivered"){
        html += `<img src="${pedido.foto}" class="img-fluid rounded mt-2">`;
    }

    resultado.innerHTML = html;
}

// DASHBOARD
function cargarDashboard(){
    document.getElementById("totalPedidos").innerText = pedidos.length;

    document.getElementById("ordenados").innerText =
        pedidos.filter(p => p.estado === "Ordered").length;

    document.getElementById("proceso").innerText =
        pedidos.filter(p => p.estado === "In process").length;

    document.getElementById("entregados").innerText =
        pedidos.filter(p => p.estado === "Delivered").length;
}

cargarDashboard();

</script>

</body>
</html>
